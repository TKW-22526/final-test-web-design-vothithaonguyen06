<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết sản phẩm</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style1.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="../page1.html">Crochet Handmade</a>

            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="../page1.html">Trang chủ</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">
                            Giỏ hàng
                            <span class="badge bg-danger" id="cart-count">0</span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="container my-5" style="min-height: 50vh;">
        <div class="row align-items-center">

            <div class="col-md-6">
                <img id="product-image" class="img-fluid rounded shadow" alt="Sản phẩm">
            </div>

            <div class="col-md-6">
                <h2 id="product-name" class="fw-bold"></h2>
                <h3 id="product-price" class="text-danger my-3"></h3>
                <p id="product-description" class="text-muted mb-4"></p>

                <div class="d-flex gap-2 align-items-center mb-4">
                    <button class="btn btn-success add-cart px-4 py-2 fw-bold m-0">
                        Mua ngay
                    </button>
                    <a href="page1.html" class="btn btn-secondary px-4 py-2 fw-bold">
                        Quay lại
                    </a>
                </div>
            </div>

        </div>
    </section>

    <footer class="bg-dark text-white text-center p-4">
        <div class="container">
            <p class="mb-2">© 2026 Crochet Handmade</p>
            <div class="small text-muted">
                <span class="me-3">📧 Email: <a href="mailto:contact@crochethandmade.com" class="text-white-50 text-decoration-none">contact@crochethandmade.com</a></span>
                <span>🌐 Facebook: <a href="https://facebook.com/crochethandmade" target="_blank" class="text-white-50 text-decoration-none">fb.com/crochethandmade</a></span>
            </div>
        </div>
    </footer>

    <script src="../js/lib.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
